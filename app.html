<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tennis Match Predictor</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #2d6a4f;
    --green-light: #52b788;
    --green-pale: #d8f3dc;
    --clay: #c0704a;
    --clay-pale: #f5e6df;
    --dark: #1a1a1a;
    --mid: #444;
    --soft: #888;
    --bg: #f7f5f0;
    --white: #ffffff;
    --border: #e0dcd4;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--dark);
    min-height: 100vh;
    padding: 0;
  }

  .court-header {
    background: var(--green);
    padding: 2rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .court-header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      90deg,
      transparent,
      transparent 48%,
      rgba(255,255,255,0.07) 48%,
      rgba(255,255,255,0.07) 52%
    );
  }
  .court-header::after {
    content: '';
    position: absolute;
    left: 50%;
    top: 0; bottom: 0;
    width: 2px;
    background: rgba(255,255,255,0.15);
    transform: translateX(-50%);
  }
  .court-header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3rem;
    color: white;
    letter-spacing: 3px;
    position: relative;
    z-index: 1;
  }
  .court-header p {
    color: rgba(255,255,255,0.75);
    font-size: 0.9rem;
    margin-top: 0.4rem;
    position: relative;
    z-index: 1;
  }

  .main { max-width: 800px; margin: 0 auto; padding: 2rem 1rem; }

  .surface-tabs {
    display: flex; gap: 8px; margin-bottom: 1.5rem;
  }
  .surface-tab {
    flex: 1;
    padding: 0.6rem;
    border: 2px solid var(--border);
    border-radius: 8px;
    background: white;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--soft);
    transition: all 0.2s;
    text-align: center;
  }
  .surface-tab.active[data-surface="hard"] { border-color: #3a7abf; color: #3a7abf; background: #eef4fc; }
  .surface-tab.active[data-surface="clay"] { border-color: var(--clay); color: var(--clay); background: var(--clay-pale); }
  .surface-tab.active[data-surface="grass"] { border-color: var(--green); color: var(--green); background: var(--green-pale); }

  .players-grid {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 1rem;
    align-items: start;
    margin-bottom: 1.5rem;
  }
  .vs-badge {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem;
    color: var(--soft);
    padding-top: 2rem;
  }

  .player-card {
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem;
  }
  .player-card label {
    font-size: 0.75rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--soft);
    display: block;
    margin-bottom: 0.5rem;
  }
  .player-card input, .player-card select {
    width: 100%;
    padding: 0.6rem 0.75rem;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    background: var(--bg);
    color: var(--dark);
    margin-bottom: 0.75rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .player-card input:focus, .player-card select:focus {
    border-color: var(--green-light);
  }

  .stat-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.5rem;
  }
  .stat-row label {
    font-size: 0.78rem;
    color: var(--soft);
    text-transform: none;
    letter-spacing: 0;
    margin: 0;
  }
  .stat-row input[type="range"] {
    width: 100px;
    margin: 0;
    padding: 0;
    border: none;
    background: none;
    accent-color: var(--green);
  }
  .stat-val {
    font-size: 0.82rem;
    font-weight: 500;
    color: var(--dark);
    min-width: 28px;
    text-align: right;
  }

  .analyze-btn {
    width: 100%;
    padding: 1rem;
    background: var(--green);
    color: white;
    border: none;
    border-radius: 10px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 2px;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    margin-bottom: 1.5rem;
  }
  .analyze-btn:hover { background: #245c42; }
  .analyze-btn:active { transform: scale(0.99); }
  .analyze-btn:disabled { background: #aaa; cursor: not-allowed; }

  .result-box {
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    display: none;
  }
  .result-box.show { display: block; }

  .result-header {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 2px;
    color: var(--soft);
    margin-bottom: 1rem;
  }

  .win-bar-wrap {
    display: grid;
    grid-template-columns: 80px 1fr 80px;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 1.25rem;
  }
  .win-name { font-weight: 500; font-size: 0.9rem; }
  .win-name.right { text-align: right; }
  .bar-track {
    height: 18px;
    background: var(--bg);
    border-radius: 99px;
    overflow: hidden;
    display: flex;
  }
  .bar-fill-a {
    background: var(--green);
    border-radius: 99px 0 0 99px;
    transition: width 0.8s cubic-bezier(.4,0,.2,1);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.7rem; font-weight: 500; color: white;
  }
  .bar-fill-b {
    background: var(--clay);
    border-radius: 0 99px 99px 0;
    transition: width 0.8s cubic-bezier(.4,0,.2,1);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.7rem; font-weight: 500; color: white;
  }

  .prediction-text {
    font-size: 0.9rem;
    line-height: 1.7;
    color: var(--mid);
    border-top: 1px solid var(--border);
    padding-top: 1rem;
  }
  .prediction-text strong { color: var(--dark); }

  .loading-dots span {
    display: inline-block;
    animation: bounce 1.2s infinite;
    font-size: 1.5rem;
  }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-8px); }
  }

  .back-link {
    display: inline-block;
    margin: 1.5rem 0 0;
    color: var(--green);
    font-size: 0.85rem;
    text-decoration: none;
    font-weight: 500;
  }
  .back-link:hover { text-decoration: underline; }

  .score-chip {
    display: inline-block;
    background: var(--green-pale);
    color: var(--green);
    border-radius: 99px;
    padding: 2px 10px;
    font-size: 0.78rem;
    font-weight: 500;
    margin-left: 6px;
  }
  .score-chip.clay { background: var(--clay-pale); color: var(--clay); }
</style>
</head>
<body>

<div class="court-header">
  <h1>🎾 Match Predictor</h1>
  <p>Enter two players and let AI analyze who wins</p>
</div>

<div class="main">

  <div class="surface-tabs">
    <button class="surface-tab active" data-surface="hard">🔵 Hard Court</button>
    <button class="surface-tab" data-surface="clay">🟠 Clay</button>
    <button class="surface-tab" data-surface="grass">🟢 Grass</button>
  </div>

  <div class="players-grid">
    <div class="player-card" id="cardA">
      <label>Player 1</label>
      <input type="text" id="nameA" placeholder="e.g. Carlos Alcaraz" />

      <div class="stat-row">
        <label>Serve speed (mph)</label>
        <input type="range" min="100" max="145" value="120" id="serveA" oninput="document.getElementById('serveAval').textContent=this.value">
        <span class="stat-val" id="serveAval">120</span>
      </div>
      <div class="stat-row">
        <label>Return rating</label>
        <input type="range" min="1" max="10" value="7" id="returnA" oninput="document.getElementById('returnAval').textContent=this.value">
        <span class="stat-val" id="returnAval">7</span>
      </div>
      <div class="stat-row">
        <label>Fitness (1–10)</label>
        <input type="range" min="1" max="10" value="8" id="fitnessA" oninput="document.getElementById('fitnessAval').textContent=this.value">
        <span class="stat-val" id="fitnessAval">8</span>
      </div>
    </div>

    <div class="vs-badge">VS</div>

    <div class="player-card" id="cardB">
      <label>Player 2</label>
      <input type="text" id="nameB" placeholder="e.g. Jannik Sinner" />

      <div class="stat-row">
        <label>Serve speed (mph)</label>
        <input type="range" min="100" max="145" value="118" id="serveB" oninput="document.getElementById('serveBval').textContent=this.value">
        <span class="stat-val" id="serveBval">118</span>
      </div>
      <div class="stat-row">
        <label>Return rating</label>
        <input type="range" min="1" max="10" value="8" id="returnB" oninput="document.getElementById('returnBval').textContent=this.value">
        <span class="stat-val" id="returnBval">8</span>
      </div>
      <div class="stat-row">
        <label>Fitness (1–10)</label>
        <input type="range" min="1" max="10" value="9" id="fitnessB" oninput="document.getElementById('fitnessBval').textContent=this.value">
        <span class="stat-val" id="fitnessBval">9</span>
      </div>
    </div>
  </div>

  <button class="analyze-btn" id="analyzeBtn" onclick="runAnalysis()">⚡ Analyze Match</button>

  <div class="result-box" id="resultBox">
    <div class="result-header">AI MATCH ANALYSIS</div>
    <div class="win-bar-wrap">
      <div class="win-name" id="barNameA">Player 1</div>
      <div class="bar-track">
        <div class="bar-fill-a" id="barA" style="width:50%">50%</div>
        <div class="bar-fill-b" id="barB" style="width:50%">50%</div>
      </div>
      <div class="win-name right" id="barNameB">Player 2</div>
    </div>
    <div class="prediction-text" id="predText">
      <div class="loading-dots"><span>●</span><span>●</span><span>●</span></div>
    </div>
  </div>

  <a href="scratch.html" class="back-link">← Back to Tennis Hub</a>
</div>

<script>
  const surfaceTabs = document.querySelectorAll('.surface-tab');
  let activeSurface = 'hard';

  surfaceTabs.forEach(tab => {
    tab.addEventListener('click', () => {
      surfaceTabs.forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      activeSurface = tab.dataset.surface;
    });
  });

  function runAnalysis() {
    const nameA = document.getElementById('nameA').value.trim() || 'Player 1';
    const nameB = document.getElementById('nameB').value.trim() || 'Player 2';
    
    // Grab stats as numbers
    const statsA = {
      serve: parseInt(document.getElementById('serveA').value),
      return: parseInt(document.getElementById('returnA').value),
      fitness: parseInt(document.getElementById('fitnessA').value)
    };
    const statsB = {
      serve: parseInt(document.getElementById('serveB').value),
      return: parseInt(document.getElementById('returnB').value),
      fitness: parseInt(document.getElementById('fitnessB').value)
    };

    const btn = document.getElementById('analyzeBtn');
    btn.disabled = true;
    btn.textContent = 'Analyzing...';

    const resultBox = document.getElementById('resultBox');
    resultBox.classList.add('show');
    
    // Show loading dots for 1.5 seconds to "feel" like AI is thinking
    document.getElementById('predText').innerHTML = '<div class="loading-dots"><span>●</span><span>●</span><span>●</span></div>';

    setTimeout(() => {
      // LOGIC: Calculate a simple score based on stats + surface bonus
      let scoreA = (statsA.serve * 0.4) + (statsA.return * 5) + (statsA.fitness * 3);
      let scoreB = (statsB.serve * 0.4) + (statsB.return * 5) + (statsB.fitness * 3);

      // Surface adjustments
      if(activeSurface === 'clay') { scoreA += (statsA.return * 2); scoreB += (statsB.return * 2); }
      if(activeSurface === 'grass') { scoreA += (statsA.serve * 0.2); scoreB += (statsB.serve * 0.2); }

      // Calculate Percentages
      const total = scoreA + scoreB;
      const pA = Math.round((scoreA / total) * 100);
      const pB = 100 - pA;

      // Update UI
      document.getElementById('barNameA').textContent = nameA;
      document.getElementById('barNameB').textContent = nameB;
      document.getElementById('barA').style.width = pA + '%';
      document.getElementById('barB').style.width = pB + '%';
      document.getElementById('barA').textContent = pA + '%';
      document.getElementById('barB').textContent = pB + '%';

      const winner = pA > pB ? nameA : nameB;
      const surfaceLabel = activeSurface === 'hard' ? '🔵 Hard' : activeSurface === 'clay' ? '🟠 Clay' : '🟢 Grass';
      
      document.getElementById('predText').innerHTML = `
        <p style="margin-bottom:0.75rem">Based on the ${surfaceLabel} conditions, <strong>${winner}</strong> shows a statistical edge. 
        ${winner === nameA ? nameA : nameB}'s return rating of ${winner === nameA ? statsA.return : statsB.return} was the deciding factor in this simulation.</p>
        <p style="margin-bottom:0.75rem"><strong>🔑 Key factor:</strong> Superior efficiency on ${activeSurface} courts.</p>
        <p>
          <strong>Predicted winner:</strong> ${winner}
          <span class="score-chip">6-4, 7-5</span>
          <span class="score-chip clay">${surfaceLabel}</span>
        </p>
      `;

      btn.disabled = false;
      btn.textContent = '⚡ Analyze Match';
    }, 1500); 
  }
</script>
</body>
</html>
